<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f4ede0">
<title>Kryssord · MilesTech Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0; --card: #fcf8f0; --border: rgba(60,45,30,.12);
    --text: #27221b; --muted: #8a7f6d; --accent: #c73e3a; --indigo: #33506b;
    --matcha: #5a8f5d; --gold: #b8860b;
    --grad: linear-gradient(135deg, #c73e3a, #e0632e);
    --shadow: 0 8px 30px rgba(90,70,40,.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: "Inter", -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center;
    padding: calc(14px + env(safe-area-inset-top)) 12px calc(16px + env(safe-area-inset-bottom)); }
  button { font-family: inherit; cursor: cursor; cursor: pointer; }
  h1 { font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 26px; text-align: center; }
  h1 span { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { text-align: center; font-size: 12px; color: var(--muted); margin: 2px 0 12px; }
  a.back { position: absolute; top: calc(16px + env(safe-area-inset-top)); left: 14px; text-decoration: none;
    color: var(--muted); font-size: 13px; font-weight: 600; }

  /* brettvelger */
  #boards { display: flex; gap: 8px; margin-bottom: 14px; }
  #boards button { padding: 9px 16px; border-radius: 999px; border: 1.5px solid var(--border);
    background: none; font-size: 13px; font-weight: 800; color: var(--muted); }
  #boards button.sel { border-color: var(--accent); color: var(--accent); background: rgba(199,62,58,.06); }
  #boards button.done { border-color: var(--matcha); color: var(--matcha); }

  /* rutenett */
  #gridwrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 12px; box-shadow: var(--shadow); margin-bottom: 10px; }
  #grid { display: grid; grid-template-columns: repeat(5, 56px); grid-template-rows: repeat(5, 56px); gap: 4px; }
  @media (max-width: 360px) { #grid { grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); } }
  .cell { position: relative; border: 1.5px solid var(--border); border-radius: 9px; background: #fff;
    display: grid; place-items: center; font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 24px; font-weight: 900; color: var(--indigo); user-select: none; }
  .cell.black { background: #3a332a; border-color: #3a332a; }
  .cell .num { position: absolute; top: 2px; left: 5px; font-size: 9px; font-weight: 700; color: var(--muted); }
  .cell.inword { background: rgba(199,62,58,.07); border-color: rgba(199,62,58,.35); }
  .cell.active { background: rgba(199,62,58,.16); border-color: var(--accent); }
  .cell.wrong { color: var(--accent); background: rgba(199,62,58,.1); }
  .cell.okrow { color: var(--matcha); }

  /* hint */
  #clue { width: 100%; max-width: 320px; min-height: 44px; background: rgba(51,80,107,.08);
    border-radius: 13px; padding: 9px 14px; font-size: 13.5px; font-weight: 600; color: var(--indigo);
    text-align: center; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
  #clue b { color: var(--accent); margin-right: 6px; }

  /* hintlister */
  #cluelists { width: 100%; max-width: 320px; display: flex; gap: 10px; font-size: 11.5px;
    color: var(--muted); margin-bottom: 12px; }
  #cluelists > div { flex: 1; }
  #cluelists h3 { font-size: 10.5px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 4px; }
  #cluelists .cl { padding: 2px 0; line-height: 1.35; }
  #cluelists .cl.solved { color: var(--matcha); text-decoration: line-through; }

  /* tastatur */
  #kb { width: 100%; max-width: 420px; }
  .krow { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
  .krow button { flex: 1; max-width: 40px; padding: 12px 0; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); font-size: 15px; font-weight: 700; color: var(--text);
    box-shadow: 0 2px 5px rgba(90,70,40,.08); }
  .krow button.wide { max-width: 64px; font-size: 13px; color: var(--accent); }
  .krow button:active { background: rgba(199,62,58,.1); }

  #actions { display: flex; gap: 8px; margin-top: 8px; }
  #actions button { padding: 9px 16px; border-radius: 999px; border: 1.5px solid var(--border);
    background: none; font-size: 12.5px; font-weight: 700; color: var(--muted); }
  #banner { min-height: 24px; margin-top: 8px; font-size: 14px; font-weight: 800; color: var(--matcha); text-align: center; }
</style>
</head>
<body>
<a class="back" href="../">← Games</a>
<h1>Kryssord <span>✏️</span></h1>
<div class="sub">Tre brett · trykk en rute, skriv med tastaturet under</div>

<div id="boards"></div>
<div id="gridwrap"><div id="grid"></div></div>
<div id="clue">Trykk på en rute for å starte</div>
<div id="cluelists">
  <div><h3>Vannrett</h3><div id="cl-across"></div></div>
  <div><h3>Loddrett</h3><div id="cl-down"></div></div>
</div>
<div id="kb"></div>
<div id="actions">
  <button id="check">Sjekk</button>
  <button id="clear">Tøm brettet</button>
  <button id="solve">Fasit</button>
</div>
<div id="banner"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const N = 5;
const BLACKS = [[1,1],[1,3],[3,1],[3,3]];

/* Hvert brett: 3 vannrette (rad 0,2,4) + 3 loddrette (kolonne 0,2,4) ord.
   Løseren har verifisert at alle kryssinger stemmer. */
const BOARDS = [
  { name: "Brett 1",
    across: [
      { row: 0, word: "GITAR", clue: "Strengeinstrument med seks strenger" },
      { row: 2, word: "ESKEN", clue: "Gaven ligger ofte i denne" },
      { row: 4, word: "SKOLE", clue: "Der elevene lærer" }],
    down: [
      { col: 0, word: "GRESS", clue: "Grønt teppe i hagen" },
      { col: 2, word: "TOKYO", clue: "Japans hovedstad 🚄" },
      { col: 4, word: "RENNE", clue: "Det vann gjør nedover" }] },
  { name: "Brett 2",
    across: [
      { row: 0, word: "HUSET", clue: "Der familien bor" },
      { row: 2, word: "VEIEN", clue: "Den kjører du på" },
      { row: 4, word: "TRENE", clue: "Det du gjør på treningssenteret" }],
    down: [
      { col: 0, word: "HAVET", clue: "Stort, blått og salt" },
      { col: 2, word: "SEILE", clue: "Komme seg fremover med vind" },
      { col: 4, word: "TANKE", clue: "Den dukker opp i hodet" }] },
  { name: "Brett 3",
    across: [
      { row: 0, word: "LESER", clue: "Det du gjør med en god bok" },
      { row: 2, word: "ROSEN", clue: "Blomsten med torner" },
      { row: 4, word: "REISE", clue: "Ferietur — gjerne til Japan" }],
    down: [
      { col: 0, word: "LÆRER", clue: "Jobber på skolen" },
      { col: 2, word: "SUSHI", clue: "Japansk rett med ris og rå fisk 🍣" },
      { col: 4, word: "RENNE", clue: "Takens vannvei" }] }
];

/* bygg fasit-rutenett + ordliste per brett */
function buildBoard(b) {
  const sol = Array.from({ length: N }, () => new Array(N).fill(null));
  BLACKS.forEach(([r, c]) => sol[r][c] = "#");
  const words = [];
  b.across.forEach(w => {
    for (let i = 0; i < N; i++) sol[w.row][i] = w.word[i];
    words.push({ ...w, dir: "a", cells: Array.from({ length: N }, (_, i) => [w.row, i]) });
  });
  b.down.forEach(w => {
    for (let i = 0; i < N; i++) {
      if (sol[i][w.col] !== null && sol[i][w.col] !== "#" && sol[i][w.col] !== w.word[i])
        throw new Error("Kryssing stemmer ikke: " + w.word);
      sol[i][w.col] = w.word[i];
    }
    words.push({ ...w, dir: "d", cells: Array.from({ length: N }, (_, i) => [i, w.col]) });
  });
  // nummerering: startruter i lesende rekkefølge
  const starts = [];
  words.forEach(w => {
    const key = w.cells[0].join(",");
    if (!starts.includes(key)) starts.push(key);
  });
  starts.sort((a, b2) => { const [r1,c1] = a.split(","), [r2,c2] = b2.split(","); return r1 - r2 || c1 - c2; });
  words.forEach(w => { w.num = starts.indexOf(w.cells[0].join(",")) + 1; });
  return { ...b, sol, words };
}
const boards = BOARDS.map(buildBoard);

/* ---------- tilstand ---------- */
const LS = "kryssord-v1";
let cur = 0;                 // aktivt brett
let entries = load();        // entries[boardIdx][r][c] = bokstav eller ""
let sel = null;              // { word, idx }

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(LS));
    if (Array.isArray(s) && s.length === boards.length) return s;
  } catch (e) {}
  return boards.map(() => Array.from({ length: N }, () => new Array(N).fill("")));
}
function save() { localStorage.setItem(LS, JSON.stringify(entries)); }

function isBlack(r, c) { return boards[cur].sol[r][c] === "#"; }
function solvedBoard(bi) {
  const b = boards[bi];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++)
    if (b.sol[r][c] !== "#" && entries[bi][r][c] !== b.sol[r][c]) return false;
  return true;
}
function wordSolved(w) { return w.cells.every(([r, c]) => entries[cur][r][c] === boards[cur].sol[r][c]); }

/* ---------- render ---------- */
function renderBoards() {
  $("boards").innerHTML = boards.map((b, i) =>
    `<button class="${i === cur ? "sel" : ""} ${solvedBoard(i) ? "done" : ""}" data-i="${i}">
     ${solvedBoard(i) ? "✓ " : ""}${b.name}</button>`).join("");
  $("boards").querySelectorAll("button").forEach(b => b.onclick = () => { cur = +b.dataset.i; sel = null; renderAll(); });
}

function cellNum(r, c) {
  const w = boards[cur].words.find(w => w.cells[0][0] === r && w.cells[0][1] === c);
  return w ? w.num : null;
}

function renderGrid(marks) {
  let h = "";
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (isBlack(r, c)) { h += `<div class="cell black"></div>`; continue; }
    const num = cellNum(r, c);
    const inWord = sel && sel.word.cells.some(([wr, wc]) => wr === r && wc === c);
    const active = sel && sel.word.cells[sel.idx][0] === r && sel.word.cells[sel.idx][1] === c;
    const mark = marks ? marks[r][c] : "";
    h += `<div class="cell ${inWord ? "inword" : ""} ${active ? "active" : ""} ${mark}" data-r="${r}" data-c="${c}">
      ${num ? `<span class="num">${num}</span>` : ""}${entries[cur][r][c]}</div>`;
  }
  $("grid").innerHTML = h;
  $("grid").querySelectorAll(".cell[data-r]").forEach(el =>
    el.onclick = () => selectCell(+el.dataset.r, +el.dataset.c));
}

function renderClue() {
  if (!sel) { $("clue").innerHTML = "Trykk på en rute for å starte"; return; }
  const w = sel.word;
  $("clue").innerHTML = `<span><b>${w.num} ${w.dir === "a" ? "vannrett" : "loddrett"}:</b> ${w.clue}</span>`;
}
function renderClueLists() {
  const ws = boards[cur].words;
  $("cl-across").innerHTML = ws.filter(w => w.dir === "a").map(w =>
    `<div class="cl ${wordSolved(w) ? "solved" : ""}">${w.num}. ${w.clue}</div>`).join("");
  $("cl-down").innerHTML = ws.filter(w => w.dir === "d").map(w =>
    `<div class="cl ${wordSolved(w) ? "solved" : ""}">${w.num}. ${w.clue}</div>`).join("");
}
function renderAll(marks) { renderBoards(); renderGrid(marks); renderClue(); renderClueLists(); }

/* ---------- interaksjon ---------- */
function wordsAt(r, c) { return boards[cur].words.filter(w => w.cells.some(([wr, wc]) => wr === r && wc === c)); }

function selectCell(r, c) {
  const ws = wordsAt(r, c);
  if (!ws.length) return;
  let word = ws[0];
  if (sel && sel.word.cells.some(([wr, wc]) => wr === r && wc === c) && ws.length > 1) {
    // trykk igjen på samme rute: bytt retning
    word = ws.find(w => w !== sel.word) || ws[0];
  }
  sel = { word, idx: word.cells.findIndex(([wr, wc]) => wr === r && wc === c) };
  renderAll();
}

function typeLetter(L) {
  if (!sel) return;
  const [r, c] = sel.word.cells[sel.idx];
  entries[cur][r][c] = L;
  if (sel.idx < sel.word.cells.length - 1) sel.idx++;
  save();
  $("banner").textContent = solvedBoard(cur) ? "🎉 Brettet er løst!" : "";
  renderAll();
}
function backspace() {
  if (!sel) return;
  const [r, c] = sel.word.cells[sel.idx];
  if (entries[cur][r][c]) entries[cur][r][c] = "";
  else if (sel.idx > 0) { sel.idx--; const [r2, c2] = sel.word.cells[sel.idx]; entries[cur][r2][c2] = ""; }
  save(); renderAll();
}

/* tastatur */
const ROWS = ["QWERTYUIOPÅ", "ASDFGHJKLØÆ", "ZXCVBNM"];
$("kb").innerHTML = ROWS.map((row, i) =>
  `<div class="krow">${i === 2 ? "" : ""}${[...row].map(L => `<button data-l="${L}">${L}</button>`).join("")}
   ${i === 2 ? `<button class="wide" data-l="⌫">⌫</button>` : ""}</div>`).join("");
$("kb").querySelectorAll("button").forEach(b => b.onclick = () => {
  b.dataset.l === "⌫" ? backspace() : typeLetter(b.dataset.l);
});
document.addEventListener("keydown", e => {
  if (e.key === "Backspace") { backspace(); e.preventDefault(); }
  else if (/^[a-zæøåA-ZÆØÅ]$/.test(e.key)) typeLetter(e.key.toUpperCase());
});

/* handlinger */
$("check").onclick = () => {
  const marks = Array.from({ length: N }, () => new Array(N).fill(""));
  let wrong = 0;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (isBlack(r, c) || !entries[cur][r][c]) continue;
    if (entries[cur][r][c] !== boards[cur].sol[r][c]) { marks[r][c] = "wrong"; wrong++; }
    else marks[r][c] = "okrow";
  }
  $("banner").textContent = wrong ? `${wrong} feil bokstav${wrong > 1 ? "er" : ""} (markert rødt)` :
    solvedBoard(cur) ? "🎉 Alt riktig!" : "Ingen feil så langt — fortsett!";
  renderAll(marks);
}
$("clear").onclick = () => {
  if (!confirm("Tømme hele brettet?")) return;
  entries[cur] = Array.from({ length: N }, () => new Array(N).fill(""));
  save(); $("banner").textContent = ""; renderAll();
};
$("solve").onclick = () => {
  if (!confirm("Vise fasit for dette brettet?")) return;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++)
    if (!isBlack(r, c)) entries[cur][r][c] = boards[cur].sol[r][c];
  save(); $("banner").textContent = "Fasit vist"; renderAll();
};

renderAll();
</script>
</body>
</html>
