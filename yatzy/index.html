<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4ede0">
<title>Yatzy · MilesTech Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede0; --card: #fcf8f0; --border: rgba(60,45,30,.12);
    --text: #27221b; --muted: #8a7f6d; --accent: #c73e3a; --indigo: #33506b;
    --matcha: #5a8f5d; --gold: #b8860b;
    --grad: linear-gradient(135deg, #c73e3a, #e0632e);
    --shadow: 0 8px 30px rgba(90,70,40,.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: "Inter", -apple-system, sans-serif;
    padding: calc(16px + env(safe-area-inset-top)) 12px calc(24px + env(safe-area-inset-bottom)); }
  button { font-family: inherit; cursor: pointer; }
  h1 { font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 28px; text-align: center; }
  h1 span { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { text-align: center; font-size: 12.5px; color: var(--muted); margin: 4px 0 18px; }
  a.back { position: absolute; top: calc(18px + env(safe-area-inset-top)); left: 14px; text-decoration: none;
    color: var(--muted); font-size: 13px; font-weight: 600; }

  .wrap { max-width: 720px; margin: 0 auto; }

  /* -------- setup -------- */
  #setup { max-width: 420px; margin: 0 auto; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; }
  .panel h2 { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 12px; }
  .mode-row { display: flex; gap: 8px; }
  .mode-btn { flex: 1; padding: 13px 8px; border-radius: 14px; border: 2px solid var(--border);
    background: none; font-size: 14px; font-weight: 700; color: var(--muted); transition: all .15s; }
  .mode-btn small { display: block; font-size: 10.5px; font-weight: 500; margin-top: 3px; }
  .mode-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(199,62,58,.06); }
  .name-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .name-row input { flex: 1; border: 1px solid var(--border); background: rgba(60,45,30,.03);
    border-radius: 12px; padding: 11px 14px; font-size: 15px; font-family: inherit; outline: none; color: var(--text); }
  .name-row input:focus { border-color: var(--accent); }
  .name-row button { width: 46px; border-radius: 12px; border: none; background: var(--grad);
    color: #fff; font-size: 22px; font-weight: 700; }
  .plist { display: flex; flex-wrap: wrap; gap: 7px; }
  .ptag { display: flex; align-items: center; gap: 6px; background: rgba(51,80,107,.08);
    color: var(--indigo); font-size: 13px; font-weight: 700; padding: 7px 8px 7px 13px; border-radius: 999px; }
  .ptag button { background: none; border: none; color: var(--indigo); opacity: .6; font-size: 15px; padding: 0 4px; }
  #start-btn { width: 100%; padding: 15px; border: none; border-radius: 16px; background: var(--grad);
    color: #fff; font-size: 16px; font-weight: 800; box-shadow: var(--shadow); }
  #start-btn:disabled { opacity: .4; }

  /* -------- board -------- */
  #board { display: none; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .toolbar .mode-pill { font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
    color: var(--accent); background: rgba(199,62,58,.08); padding: 5px 12px; border-radius: 999px; }
  .toolbar button { background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 999px; }

  .tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--card);
    border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
  table { border-collapse: collapse; width: 100%; min-width: 320px; }
  th, td { border-bottom: 1px solid var(--border); font-size: 13px; }
  th { padding: 10px 8px; font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 13px; }
  thead th { position: sticky; top: 0; background: var(--card); }
  thead th.leader { color: var(--gold); }
  td.cat { padding: 9px 10px; font-weight: 600; white-space: nowrap; position: sticky; left: 0;
    background: var(--card); min-width: 108px; }
  td.cat small { color: var(--muted); font-weight: 500; font-size: 10.5px; display: block; }
  td.cell { text-align: center; min-width: 52px; padding: 4px; font-variant-numeric: tabular-nums; }
  .cellbtn { width: 100%; min-height: 36px; border-radius: 10px; border: 1.5px dashed var(--border);
    background: none; font-size: 14px; font-weight: 700; color: var(--muted); }
  .cellbtn.open { border-color: var(--accent); color: var(--accent); background: rgba(199,62,58,.05); }
  .cellbtn.locked { border-style: solid; border-color: transparent; color: #cfc4ae; font-size: 16px; }
  .cellbtn.filled { border-style: solid; border-color: transparent; background: rgba(51,80,107,.07);
    color: var(--indigo); font-size: 15px; }
  .cellbtn.struck { border-style: solid; border-color: transparent; background: rgba(60,45,30,.05);
    color: var(--muted); text-decoration: line-through; }
  tr.sumrow td { background: rgba(184,134,11,.07); font-weight: 800; padding: 9px 10px; }
  tr.sumrow td.cat { background: #f6ecd7; }
  tr.totalrow td { background: rgba(199,62,58,.08); font-weight: 900; font-size: 15px; padding: 11px 10px;
    border-bottom: none; }
  tr.totalrow td.cat { background: #f4e0d8; font-family: "Zen Kaku Gothic New", sans-serif; }
  .bonus-hit { color: var(--matcha); }
  .bonus-miss { color: var(--muted); font-size: 10.5px; font-weight: 600; }
  .crown { font-size: 13px; }
  tr.saverow td { background: rgba(90,143,93,.09); font-weight: 800; padding: 8px 10px; }
  tr.saverow td.cat { background: #e9f0e6; }
  .pace { display: block; font-size: 10px; font-weight: 700; color: #c3b592; margin-top: 1px; }
  thead th.turn { color: var(--accent); }
  thead th .turntag { display: block; font-size: 8.5px; font-weight: 800; color: var(--accent); letter-spacing: .5px; }
  thead th .bankchip { display: inline-block; margin-top: 3px; font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 999px; background: rgba(90,143,93,.14); }
  thead th .bankchip.neg { background: rgba(199,62,58,.14); }
  #turn-banner { text-align: center; font-size: 14px; font-weight: 700; color: var(--indigo); margin-bottom: 12px; min-height: 20px; }
  #turn-banner b { color: var(--accent); }
  .save-pos { color: var(--matcha); }
  .save-neg { color: var(--accent); }

  /* -------- picker -------- */
  #overlay { position: fixed; inset: 0; background: rgba(39,34,27,.4); z-index: 90; display: none; }
  #picker { position: fixed; left: 0; right: 0; bottom: 0; z-index: 100; display: none;
    background: var(--card); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(90,70,40,.3);
    padding: 20px 18px calc(24px + env(safe-area-inset-bottom)); max-height: 70vh; overflow-y: auto; }
  #picker.show, #overlay.show { display: block; }
  #picker h3 { font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 18px; }
  #picker .for { font-size: 12.5px; color: var(--muted); margin: 2px 0 14px; }
  #picker .for b { color: var(--accent); }
  .vals { display: flex; flex-wrap: wrap; gap: 8px; }
  .val { min-width: 52px; padding: 12px 10px; border-radius: 13px; border: 1.5px solid var(--border);
    background: none; font-size: 16px; font-weight: 800; color: var(--indigo); }
  .val:active { background: rgba(51,80,107,.1); }
  .val.strike { color: var(--accent); border-color: rgba(199,62,58,.3); }
  .val.undo { color: var(--muted); font-size: 13px; font-weight: 700; }
  #pk-rolls { margin-bottom: 16px; }
  #pk-rolls .rlabel { font-size: 12.5px; color: var(--muted); margin-bottom: 8px; font-weight: 600; line-height: 1.4; }
  #pk-rolls .rbtns { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  #pk-rolls .rb { min-width: 40px; padding: 9px 8px; border-radius: 11px; border: 1.5px solid var(--border);
    background: none; font-size: 15px; font-weight: 800; color: var(--indigo); }
  #pk-rolls .rb.save { color: #3c6b3f; border-color: rgba(90,143,93,.35); }
  #pk-rolls .rb.loan { color: var(--accent); border-color: rgba(199,62,58,.4); background: rgba(199,62,58,.04); }
  #pk-rolls .rb.sel { box-shadow: 0 0 0 2px var(--matcha) inset; }
  #pk-rolls .rb.strike { color: var(--accent); font-size: 12px; min-width: auto; padding: 9px 11px; }
  #pk-rolls .rinput { width: 66px; border: 1.5px solid var(--border); border-radius: 11px;
    padding: 9px 8px; font-size: 15px; font-weight: 800; text-align: center; font-family: inherit;
    outline: none; color: var(--indigo); }
  #pk-rolls .rinput:focus { border-color: var(--matcha); }
  #pk-rolls .reffect { font-size: 12.5px; font-weight: 700; margin-top: 10px; color: var(--muted); line-height: 1.5; }
  #pk-rolls .rwarn { margin-top: 8px; font-size: 12.5px; font-weight: 800; color: var(--accent);
    background: rgba(199,62,58,.08); border-radius: 10px; padding: 8px 11px; display: none; }
  #pk-rolls .rwarn.show { display: block; }

  /* -------- virtuell terning -------- */
  #dice-overlay { position: fixed; inset: 0; background: rgba(39,34,27,.4); z-index: 90; display: none; }
  #dice-overlay.show { display: block; }
  #dice-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 100; display: none;
    background: var(--card); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(90,70,40,.3);
    max-height: 82vh; overflow-y: auto;
    padding: 22px 18px calc(26px + env(safe-area-inset-bottom)); text-align: center; }
  #dice-sheet.show { display: block; }
  #dice-sheet h3 { font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 20px; }
  #dice-sheet .dsub { font-size: 12.5px; color: var(--muted); margin: 3px 0 16px; }
  #dice-tray { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; min-height: 66px; }
  .die { width: 60px; height: 60px; border-radius: 14px; background: #fff; border: 1px solid var(--border);
    box-shadow: 0 3px 10px rgba(90,70,40,.16); display: grid; grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr); padding: 9px; cursor: pointer; position: relative; transition: transform .1s; }
  .die.blank { opacity: .35; }
  .die .pip { width: 10px; height: 10px; border-radius: 50%; background: var(--indigo); align-self: center; justify-self: center; }
  .die.held { outline: 3px solid var(--matcha); outline-offset: 2px; }
  .die.held::after { content: "HOLD"; position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
    font-size: 8px; font-weight: 900; letter-spacing: .5px; color: #fff; background: var(--matcha);
    padding: 1px 6px; border-radius: 999px; }
  .die.rolling { animation: diceshake .28s infinite; }
  @keyframes diceshake {
    0% { transform: rotate(-9deg) translateY(0); } 25% { transform: rotate(9deg) translateY(-5px); }
    50% { transform: rotate(-7deg) translateY(0); } 75% { transform: rotate(7deg) translateY(-3px); }
    100% { transform: rotate(0) translateY(0); } }
  #dice-count { font-size: 12.5px; font-weight: 800; color: var(--muted); margin-bottom: 4px; }
  #dice-sum { font-size: 13px; color: var(--indigo); font-weight: 700; margin-bottom: 16px; min-height: 18px; }
  #dice-sum b { color: var(--accent); }
  #dice-roll { width: 100%; padding: 15px; border: none; border-radius: 16px; background: var(--grad);
    color: #fff; font-size: 16px; font-weight: 800; box-shadow: var(--shadow); }
  #dice-roll:disabled { opacity: .4; }
  #dice-reset { width: 100%; margin-top: 10px; padding: 12px; border-radius: 14px; border: 1.5px solid var(--border);
    background: none; color: var(--muted); font-size: 14px; font-weight: 700; }
  .dhint { font-size: 11.5px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
<a class="back" href="../">← Games</a>
<h1>Yatzy <span>🎲</span></h1>
<div class="sub">Digital blokk · automatisk summering · bonusvarsel</div>

<div id="setup">
  <div class="panel">
    <h2>Variant</h2>
    <div class="mode-row">
      <button class="mode-btn sel" id="mode-bound">Klassisk (bunden)<small>Fyll ut ovenfra og ned</small></button>
      <button class="mode-btn" id="mode-free">Fri<small>Velg rad selv hver runde</small></button>
    </div>
  </div>
  <div class="panel">
    <h2>Sparing (valgfritt)</h2>
    <div class="mode-row">
      <button class="mode-btn sel" id="save-off">Av<small>Vanlige regler</small></button>
      <button class="mode-btn" id="save-on">På<small>Spar ubrukte kast · kjøp ekstra (2×)</small></button>
    </div>
  </div>
  <div class="panel">
    <h2>Spillere</h2>
    <div class="name-row">
      <input id="pname" placeholder="Navn …" maxlength="14" autocomplete="off">
      <button id="padd">+</button>
    </div>
    <div class="plist" id="plist"></div>
  </div>
  <button id="start-btn" disabled>Start spillet</button>
</div>

<div id="board">
  <div class="wrap">
    <div class="toolbar">
      <span class="mode-pill" id="mode-pill"></span>
      <div style="display:flex;gap:8px">
        <button id="open-dice">🎲 Terning</button>
        <button id="toggle-total">Skjul totalt</button>
        <button id="new-game">Nytt spill</button>
      </div>
    </div>
    <div id="turn-banner"></div>
    <div class="tablewrap"><table id="tbl"></table></div>
  </div>
</div>

<div id="overlay"></div>
<div id="picker">
  <h3 id="pk-cat"></h3>
  <div class="for">Poeng for <b id="pk-player"></b></div>
  <div id="pk-rolls" style="display:none"></div>
  <div class="vals" id="pk-vals"></div>
</div>

<div id="dice-overlay"></div>
<div id="dice-sheet">
  <h3>🎲 Virtuell terning</h3>
  <div class="dsub">Kast, hold de du vil beholde, kast resten — 3 kast per tur</div>
  <div id="dice-tray"></div>
  <div id="dice-count">Trykk «Kast» for å starte</div>
  <div id="dice-sum"></div>
  <button id="dice-roll">🎲 Kast terningene</button>
  <button id="dice-reset">Ny tur (nullstill)</button>
  <div class="dhint">Tips: bruk kast-telleren her når du fyller inn med «sparing» i blokka.</div>
</div>

<script>
"use strict";
/* ---------- kategorier med gyldige verdier ---------- */
function range(a, b, step) { const r = []; for (let v = a; v <= b; v += step) r.push(v); return r; }
function husValues() { // 3 like av a + 2 like av b, a ≠ b
  const s = new Set();
  for (let a = 1; a <= 6; a++) for (let b = 1; b <= 6; b++) if (a !== b) s.add(3*a + 2*b);
  return [...s].sort((x, y) => x - y);
}
function toPairValues() { // to ulike par
  const s = new Set();
  for (let a = 1; a <= 6; a++) for (let b = a + 1; b <= 6; b++) s.add(2*a + 2*b);
  return [...s].sort((x, y) => x - y);
}
const CATS = [
  { id: "n1", name: "Enere",   hint: "kun 1-ere teller",  upper: 1, vals: range(0, 5, 1) },
  { id: "n2", name: "Toere",   hint: "kun 2-ere teller",  upper: 2, vals: range(0, 10, 2) },
  { id: "n3", name: "Treere",  hint: "kun 3-ere teller",  upper: 3, vals: range(0, 15, 3) },
  { id: "n4", name: "Firere",  hint: "kun 4-ere teller",  upper: 4, vals: range(0, 20, 4) },
  { id: "n5", name: "Femmere", hint: "kun 5-ere teller",  upper: 5, vals: range(0, 25, 5) },
  { id: "n6", name: "Seksere", hint: "kun 6-ere teller",  upper: 6, vals: range(0, 30, 6) },
  { id: "pair",  name: "Ett par",        hint: "to like",             vals: range(2, 12, 2) },
  { id: "twop",  name: "To par",         hint: "to ulike par",        vals: toPairValues() },
  { id: "three", name: "Tre like",       hint: "",                    vals: range(3, 18, 3) },
  { id: "four",  name: "Fire like",      hint: "",                    vals: range(4, 24, 4) },
  { id: "smstr", name: "Liten straight", hint: "1-2-3-4-5 = 15",      vals: [15] },
  { id: "lgstr", name: "Stor straight",  hint: "2-3-4-5-6 = 20",      vals: [20] },
  { id: "hus",   name: "Hus",            hint: "tre like + to like",  vals: husValues() },
  { id: "chance", name: "Sjanse",        hint: "sum av alle terninger", vals: range(5, 30, 1) },
  { id: "yatzy", name: "Yatzy",          hint: "fem like: 50 + øyne", vals: [51, 52, 53, 54, 55, 56] }
];
const UPPER_IDS = CATS.filter(c => c.upper).map(c => c.id);
const ORDER = CATS.map(c => c.id);
const BONUS_LIMIT = 63, BONUS = 50;

/* ---------- tilstand ---------- */
const LS_KEY = "yatzy-v1";
let state = null; // { mode: 'bound'|'free', players: [{name, scores: {catId: number|'X'}}] }

function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function load() {
  try { const s = JSON.parse(localStorage.getItem(LS_KEY)); if (s && s.players && s.players.length) return s; }
  catch (e) {}
  return null;
}

/* ---------- beregninger ---------- */
function upperSum(p) { return UPPER_IDS.reduce((s, id) => s + (typeof p.scores[id] === "number" ? p.scores[id] : 0), 0); }
function hasBonus(p) { return upperSum(p) >= BONUS_LIMIT; }
function total(p) {
  const all = ORDER.reduce((s, id) => s + (typeof p.scores[id] === "number" ? p.scores[id] : 0), 0);
  return all + (hasBonus(p) ? BONUS : 0);
}
function filledCount(p) { return ORDER.filter(id => p.scores[id] !== undefined).length; }
function nextBoundCat(p) { return ORDER.find(id => p.scores[id] === undefined); }
function gameOver() { return state.players.every(p => filledCount(p) === ORDER.length); }
function leaderIdx() {
  let best = -1, bi = -1;
  state.players.forEach((p, i) => { const t = total(p); if (t > best) { best = t; bi = i; } });
  return state.players.filter(p => filledCount(p) > 0).length ? bi : -1;
}
function currentTurnIdx() { // hvem sin tur: den med færrest utfylte ruter (ligger bakerst)
  if (gameOver()) return -1;
  let best = Infinity, bi = 0;
  state.players.forEach((p, i) => { const f = filledCount(p); if (f < best) { best = f; bi = i; } });
  return bi;
}
function upperPar(catId) { return CATS.find(c => c.id === catId).upper * 3; } // "standard": tre av hver
/* sparing: 3 kast gratis. 0–2 kast → spar resten. Ekstra kast tas først fra
   banken (1:1), deretter på lån til dobbel pris (2×). */
function computeDelta(rolls, bankBefore) {
  if (rolls <= 3) return 3 - rolls;               // spar ubrukte gratis-kast
  const extra = rolls - 3;
  const fromBank = Math.min(extra, Math.max(0, bankBefore)); // egne sparte kast, 1:1
  const loan = extra - fromBank;                  // lån utover banken, 2×
  return -(fromBank + loan * 2);
}
function pbank(p) { return state.saving ? (p.bank || 0) : 0; }
function emptyCount(p) { return ORDER.reduce((n, id) => n + (p.scores[id] === undefined ? 1 : 0), 0); }
/* Kast igjen = banken + gjenstående ruter × 3 gratis-kast. Kan ikke gå under 0 —
   du kan ikke låne mer enn du klarer å tjene inn på turene som er igjen. */
function kastIgjen(p) { return pbank(p) + emptyCount(p) * 3; }
/* Hvor mange EKSTRA kast (utover 3 + egne sparte) man kan låne denne turen —
   begrenset av det man klarer å betale tilbake med gratis-kastene på rutene som gjenstår. */
function maxRollsFor(bankBefore, emptyAfter) {
  const savings = Math.max(0, bankBefore);
  const debt = Math.max(0, -bankBefore);
  const loanRoom = Math.max(0, Math.floor((emptyAfter * 3 - debt) / 2)); // lån koster 2× å betale tilbake
  return 3 + savings + loanRoom;
}
/* Foreslåtte "standard-verdier" for bonus, justert for overskudd/underskudd.
   Fyller du 4 seksere (overskudd) synker kravene på de andre. */
function paceMap(p) {
  const emptyUp = UPPER_IDS.filter(id => p.scores[id] === undefined);
  const remaining = BONUS_LIMIT - upperSum(p);
  const totalWeight = emptyUp.reduce((s, id) => s + upperPar(id), 0);
  const m = {};
  emptyUp.forEach(id => {
    const c = CATS.find(x => x.id === id);
    let need = totalWeight > 0 && remaining > 0 ? remaining * (upperPar(id) / totalWeight) : 0;
    m[id] = Math.max(0, Math.min(c.upper * 5, Math.round(need)));
  });
  return m;
}

/* ---------- setup-UI ---------- */
let mode = "bound";
const names = [];
const $ = id => document.getElementById(id);

let saving = false;
$("mode-bound").onclick = () => { mode = "bound"; $("mode-bound").classList.add("sel"); $("mode-free").classList.remove("sel"); };
$("mode-free").onclick = () => { mode = "free"; $("mode-free").classList.add("sel"); $("mode-bound").classList.remove("sel"); };
$("save-off").onclick = () => { saving = false; $("save-off").classList.add("sel"); $("save-on").classList.remove("sel"); };
$("save-on").onclick = () => { saving = true; $("save-on").classList.add("sel"); $("save-off").classList.remove("sel"); };

function renderNames() {
  $("plist").innerHTML = names.map((n, i) =>
    `<span class="ptag">${n}<button data-i="${i}">✕</button></span>`).join("");
  $("plist").querySelectorAll("button").forEach(b => b.onclick = () => { names.splice(+b.dataset.i, 1); renderNames(); });
  $("start-btn").disabled = names.length === 0;
}
function addName() {
  const n = $("pname").value.trim();
  if (!n || names.length >= 8) return;
  names.push(n); $("pname").value = ""; renderNames(); $("pname").focus();
}
$("padd").onclick = addName;
$("pname").addEventListener("keydown", e => { if (e.key === "Enter") addName(); });

$("start-btn").onclick = () => {
  state = { mode, saving, showTotal: true,
    players: names.map(n => ({ name: n, scores: {}, rolls: {}, deltas: {}, bank: 0 })) };
  save(); showBoard();
};

/* ---------- brett-UI ---------- */
function showBoard() {
  $("setup").style.display = "none";
  $("board").style.display = "block";
  let pill = state.mode === "bound" ? "Klassisk · bunden" : "Fri rekkefølge";
  if (state.saving) pill += " · sparing";
  $("mode-pill").textContent = pill;
  $("toggle-total").textContent = state.showTotal ? "Skjul totalt" : "Vis totalt";
  renderBoard();
}

function cellButton(p, pi, cat, pm) {
  const v = p.scores[cat.id];
  if (v === "X") return `<button class="cellbtn struck" data-p="${pi}" data-c="${cat.id}">0</button>`;
  if (typeof v === "number") return `<button class="cellbtn filled" data-p="${pi}" data-c="${cat.id}">${v}</button>`;
  const paceHint = (cat.upper && pm && pm[cat.id] !== undefined)
    ? `<span class="pace">${pm[cat.id] === 0 ? "✓" : "≈" + pm[cat.id]}</span>` : "";
  if (state.mode === "bound" && nextBoundCat(p) !== cat.id)
    return `<button class="cellbtn locked" disabled>·${paceHint}</button>`;
  return `<button class="cellbtn open" data-p="${pi}" data-c="${cat.id}">＋${paceHint}</button>`;
}

function renderBoard() {
  const ps = state.players;
  const turnI = currentTurnIdx();
  const li = state.showTotal && (gameOver() || ps.some(p => filledCount(p) > 2)) ? leaderIdx() : -1;
  const pms = ps.map(p => paceMap(p));

  $("turn-banner").innerHTML = turnI >= 0 ? `🎲 Nå er det <b>${ps[turnI].name}</b> sin tur` : "🏁 Blokka er full";

  let h = "<thead><tr><th style='text-align:left;padding-left:12px'>Kategori</th>";
  ps.forEach((p, i) => {
    const cls = [i === li ? "leader" : "", i === turnI ? "turn" : ""].filter(Boolean).join(" ");
    const tag = i === turnI ? '<span class="turntag">DIN TUR</span>' : "";
    let chip = "";
    if (state.saving) {
      const b = pbank(p), ki = kastIgjen(p);
      const low = ki <= 3 && emptyCount(p) > 0;
      chip = `<span class="bankchip ${b < 0 || low ? "neg" : ""}">⚡ ${b} kast${low ? ` · ⚠ ${ki} igjen` : ""}</span>`;
    }
    h += `<th class="${cls}">${i === li ? '<span class="crown">👑</span> ' : ""}${p.name}${tag}${chip}</th>`;
  });
  h += "</tr></thead><tbody>";

  CATS.forEach(cat => {
    h += `<tr><td class="cat">${cat.name}${cat.hint ? `<small>${cat.hint}</small>` : ""}</td>`;
    ps.forEach((p, pi) => h += `<td class="cell">${cellButton(p, pi, cat, pms[pi])}</td>`);
    h += "</tr>";
    if (cat.id === "n6") {
      h += `<tr class="sumrow"><td class="cat">Sum <small>bonus ved ${BONUS_LIMIT}+</small></td>`;
      ps.forEach(p => {
        const s = upperSum(p);
        const upDone = UPPER_IDS.every(id => p.scores[id] !== undefined);
        let note;
        if (hasBonus(p)) note = `<div class="bonus-hit">✓ Bonus +${BONUS}</div>`;
        else if (upDone) note = `<div class="bonus-miss">ingen bonus</div>`;
        else {
          const parFilled = UPPER_IDS.filter(id => typeof p.scores[id] === "number").reduce((a, id) => a + upperPar(id), 0);
          const diff = s - parFilled;
          const buf = diff > 0 ? ` · <span class="save-pos">+${diff} i bank</span>`
            : diff < 0 ? ` · <span class="save-neg">${diff} bak</span>` : "";
          note = `<div class="bonus-miss">${BONUS_LIMIT - s} unna${buf}</div>`;
        }
        h += `<td class="cell">${s}${note}</td>`;
      });
      h += "</tr>";
    }
  });

  h += `<tr class="totalrow"><td class="cat">TOTALT</td>`;
  ps.forEach(p => h += `<td class="cell">${state.showTotal ? total(p) : "•••"}</td>`);
  h += "</tr></tbody>";
  $("tbl").innerHTML = h;

  $("tbl").querySelectorAll(".cellbtn[data-p]").forEach(b => b.onclick = () => openPicker(+b.dataset.p, b.dataset.c));

  if (gameOver()) {
    const w = state.players[leaderIdx()];
    setTimeout(() => alert(`🏆 ${w.name} vinner med ${total(w)} poeng!`), 150);
  }
}

/* ---------- picker ---------- */
let pkP = null, pkC = null, pkRolls = 3;
function openPicker(pi, catId) {
  pkP = pi; pkC = catId;
  const cat = CATS.find(c => c.id === catId);
  const p = state.players[pi];
  $("pk-cat").textContent = cat.name;
  $("pk-player").textContent = p.name;
  pkRolls = (state.saving && p.rolls && p.rolls[catId] !== undefined) ? p.rolls[catId] : 3;
  renderRolls();
  let h = cat.vals.map(v => `<button class="val" data-v="${v}">${v}</button>`).join("");
  h += `<button class="val strike" data-v="X">Stryk ✕</button>`;
  if (p.scores[catId] !== undefined) h += `<button class="val undo" data-v="UNDO">Angre ↩</button>`;
  $("pk-vals").innerHTML = h;
  $("pk-vals").querySelectorAll(".val").forEach(b => b.onclick = () => pick(b.dataset.v));
  $("picker").classList.add("show"); $("overlay").classList.add("show");
}
let pkMax = 3;
function bankBeforeCell() { // bankverdi uten denne cellens eventuelle gamle uttak
  const p = state.players[pkP];
  return pbank(p) - (p.deltas && p.deltas[pkC] !== undefined ? p.deltas[pkC] : 0);
}
function emptyAfterCell() { // ruter som fortsatt er tomme etter at denne fylles
  const p = state.players[pkP];
  return emptyCount(p) - (p.scores[pkC] === undefined ? 1 : 0);
}
function renderRolls() {
  const box = $("pk-rolls");
  if (!state.saving) { box.style.display = "none"; box.innerHTML = ""; return; }
  box.style.display = "block";
  const bankBefore = bankBeforeCell();
  const emptyAfter = emptyAfterCell();
  pkMax = maxRollsFor(bankBefore, emptyAfter);       // kan ikke låne mer enn dette
  const spendMax = 3 + Math.max(0, bankBefore);      // siste kast som bare bruker egen bank (1:1)
  const lastBtn = Math.min(pkMax, 12);
  let btns = "";
  for (let r = 0; r <= lastBtn; r++) {
    let cls = "rb";
    if (r === 0) cls += " strike";
    else if (r < 3) cls += " save";
    else if (r > spendMax) cls += " loan";
    if (r === pkRolls) cls += " sel";
    btns += `<button class="${cls}" data-r="${r}">${r === 0 ? "0 ✕" : r}</button>`;
  }
  box.innerHTML = `<div class="rlabel">Hvor mange kast brukte du? <b>0 = stryk</b> · 3 gratis · ekstra tas fra banken, over det = lån (2×)</div>
    <div class="rbtns">${btns}<input class="rinput" type="number" min="0" inputmode="numeric" placeholder="…"></div>
    <div class="reffect" id="pk-eff"></div>
    <div class="rwarn" id="pk-warn"></div>`;
  box.querySelectorAll(".rb").forEach(b => b.onclick = () => {
    const r = +b.dataset.r;
    if (r === 0) { pkRolls = 0; pick("X"); return; }  // 0 = stryk og spar 3 kast
    pkRolls = r; renderRolls();
  });
  const inp = box.querySelector(".rinput");
  inp.oninput = () => {
    const v = parseInt(inp.value, 10);
    if (!isNaN(v) && v >= 0) { pkRolls = v; markSel(); updateEffect(); }
  };
  updateEffect();
}
function markSel() {
  $("pk-rolls").querySelectorAll(".rb").forEach(b => b.classList.toggle("sel", +b.dataset.r === pkRolls));
}
function updateEffect() {
  const p = state.players[pkP];
  const bankBefore = bankBeforeCell();
  const emptyAfter = emptyAfterCell();
  const over = pkRolls > pkMax;
  const d = computeDelta(pkRolls, bankBefore);
  const after = bankBefore + d;
  const igjenAfter = after + emptyAfter * 3;
  const extra = Math.max(0, pkRolls - 3);
  const loan = Math.max(0, extra - Math.max(0, bankBefore));
  let msg;
  if (pkRolls <= 2) msg = `<span class="save-pos">+${3 - pkRolls} kast spart</span>`;
  else if (pkRolls === 3) msg = "nøytralt (3 gratis kast)";
  else if (loan === 0) msg = `<span class="save-neg">−${extra} fra banken</span>`;
  else msg = `<span class="save-neg">${loan} på lån · koster ${loan * 2} kast</span>`;
  $("pk-eff").innerHTML = `${msg} · bank etterpå: <b class="${after < 0 ? "save-neg" : "save-pos"}">${after}</b> · <b class="${igjenAfter <= 3 ? "save-neg" : ""}">${Math.max(0, igjenAfter)} kast igjen</b>`;

  const warn = $("pk-warn");
  if (over) {
    warn.classList.add("show");
    warn.textContent = `NB: du har kun ${kastIgjen(p)} kast igjen — kan bruke maks ${pkMax} kast her.`;
  } else warn.classList.remove("show");
  // sperr innlegging når man prøver å låne mer enn mulig
  $("pk-vals").querySelectorAll(".val").forEach(b => {
    if (b.classList.contains("undo")) return;
    b.disabled = over; b.style.opacity = over ? .35 : "";
  });
}
function closePicker() { $("picker").classList.remove("show"); $("overlay").classList.remove("show"); }
$("overlay").onclick = closePicker;

function pick(v) {
  const p = state.players[pkP];
  if (v !== "UNDO" && state.saving && pkRolls > pkMax) return; // for mange kast lånt
  if (v === "UNDO") {
    delete p.scores[pkC];
    if (state.saving && p.deltas && p.deltas[pkC] !== undefined) {
      p.bank -= p.deltas[pkC];
      delete p.deltas[pkC]; delete p.rolls[pkC];
    }
  } else {
    if (v === "X") p.scores[pkC] = "X"; else p.scores[pkC] = +v;
    if (state.saving) {
      const bankBefore = bankBeforeCell();          // reverserer gammelt uttak ved re-pick
      const d = computeDelta(pkRolls, bankBefore);
      p.bank = bankBefore + d;
      p.rolls[pkC] = pkRolls;
      p.deltas[pkC] = d;
    }
  }
  save(); closePicker(); renderBoard();
}

/* ---------- vis/skjul totalt ---------- */
$("toggle-total").onclick = () => {
  state.showTotal = !state.showTotal;
  $("toggle-total").textContent = state.showTotal ? "Skjul totalt" : "Vis totalt";
  save(); renderBoard();
};

/* ---------- nytt spill ---------- */
$("new-game").onclick = () => {
  if (!confirm("Starte nytt spill? Nåværende blokk slettes.")) return;
  localStorage.removeItem(LS_KEY);
  state = null;
  $("board").style.display = "none";
  $("setup").style.display = "block";
};

/* ---------- virtuell terning ---------- */
const DIE_POS = { a: [1,1], b: [1,3], c: [2,1], d: [2,2], e: [2,3], f: [3,1], g: [3,3] };
const DIE_FACES = { 1: ["d"], 2: ["a","g"], 3: ["a","d","g"], 4: ["a","b","f","g"], 5: ["a","b","d","f","g"], 6: ["a","b","c","e","f","g"] };
function diePips(val) {
  return DIE_FACES[val].map(k => `<span class="pip" style="grid-row:${DIE_POS[k][0]};grid-column:${DIE_POS[k][1]}"></span>`).join("");
}
let dice = null, diceRolls = 0, diceRolling = false;
const DICE_MAX = 3;
function resetDice() { dice = Array.from({ length: 5 }, () => ({ val: 1, held: false })); diceRolls = 0; diceRolling = false; }
function openDice() { if (!dice) resetDice(); renderDice(); $("dice-sheet").classList.add("show"); $("dice-overlay").classList.add("show"); }
function closeDice() { $("dice-sheet").classList.remove("show"); $("dice-overlay").classList.remove("show"); }
function renderDice() {
  const tray = $("dice-tray");
  tray.innerHTML = dice.map((die, i) =>
    `<div class="die${die.held ? " held" : ""}${diceRolls === 0 ? " blank" : ""}" data-i="${i}">${diePips(die.val)}</div>`).join("");
  tray.querySelectorAll(".die").forEach(el => el.onclick = () => {
    if (diceRolls === 0 || diceRolling) return;      // kan bare holde etter et kast
    dice[+el.dataset.i].held = !dice[+el.dataset.i].held;
    renderDice();
  });
  $("dice-count").textContent = diceRolls === 0 ? "Trykk «Kast» for å starte"
    : `Kast ${diceRolls} av ${DICE_MAX}${diceRolls >= DICE_MAX ? " — ferdig, trykk «Ny tur»" : " · trykk en terning for å holde den"}`;
  $("dice-sum").innerHTML = diceRolls > 0 ? `Sum: <b>${dice.reduce((s, d) => s + d.val, 0)}</b>` : "";
  const canRoll = !diceRolling && diceRolls < DICE_MAX && (diceRolls === 0 || dice.some(d => !d.held));
  $("dice-roll").disabled = !canRoll;
  $("dice-roll").textContent = diceRolls === 0 ? "🎲 Kast terningene" : "🎲 Kast på nytt";
}
function rollDice() {
  if (diceRolling || diceRolls >= DICE_MAX) return;
  const toRoll = dice.map((d, i) => i).filter(i => diceRolls === 0 || !dice[i].held);
  if (!toRoll.length) return;
  diceRolling = true; diceRolls++;
  const els = [...$("dice-tray").querySelectorAll(".die")];
  els.forEach((el, i) => { el.classList.remove("blank"); if (toRoll.includes(i)) el.classList.add("rolling"); });
  const iv = setInterval(() => {
    toRoll.forEach(i => { els[i].innerHTML = diePips(1 + Math.floor(Math.random() * 6)); });
  }, 70);
  setTimeout(() => {
    clearInterval(iv);
    toRoll.forEach(i => { dice[i].val = 1 + Math.floor(Math.random() * 6); });
    diceRolling = false;
    renderDice();
  }, 700);
}
$("open-dice").onclick = openDice;
$("dice-overlay").onclick = closeDice;
$("dice-roll").onclick = rollDice;
$("dice-reset").onclick = () => { resetDice(); renderDice(); };

/* ---------- init ---------- */
const saved = load();
if (saved) {
  state = saved;
  if (state.saving === undefined) state.saving = false;
  if (state.showTotal === undefined) state.showTotal = true;
  state.players.forEach(p => {
    if (!p.rolls) p.rolls = {};
    if (!p.deltas || p.bank === undefined) { // rekonstruér bank fra kast-historikk (i kategorirekkefølge)
      p.deltas = {}; p.bank = 0;
      ORDER.forEach(id => {
        if (p.rolls[id] !== undefined) {
          const d = computeDelta(p.rolls[id], p.bank);
          p.deltas[id] = d; p.bank += d;
        }
      });
    }
  });
  showBoard();
}
</script>
