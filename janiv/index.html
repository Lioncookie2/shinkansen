<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Janiv</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<style>body{margin:0;background:#0f172a;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ---------- Ikoner (enkle inline SVG i stedet for lucide-react) ---------- */
const Icon = ({ children, size = 18, className = "" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
    {children}
  </svg>
);
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></Icon>;
const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Icon>;
const Users = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
const Crown = (p) => <Icon {...p}><path d="M2 20h20"/><path d="M4 17l-2-9 6 4 4-7 4 7 6-4-2 9H4z"/></Icon>;
const Table2 = (p) => <Icon {...p}><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></Icon>;
const LineChartIcon = (p) => <Icon {...p}><path d="M3 3v18h18"/><path d="M18.7 8.3l-4.5 4.5-3-3-4.5 4.5"/></Icon>;

/* ---------- Spillogikk ---------- */
function applyJanivRule(total) {
  if (total > 100) return { score: total, out: true };
  if (total === 100) return { score: 50, out: false };
  if (total === 50) return { score: 0, out: false };
  return { score: total, out: false };
}
function nextThreshold(score) { return score < 50 ? 50 : 100; }
function distanceToThreshold(score) { return nextThreshold(score) - score; }

const PLAYER_COLORS = ["#34d399", "#38bdf8", "#fbbf24", "#f472b6", "#a78bfa", "#fb923c", "#4ade80", "#60a5fa"];
function playerColor(index) { return PLAYER_COLORS[index % PLAYER_COLORS.length]; }

function withCrowns(entries) {
  const active = entries.filter((e) => !e.out);
  if (active.length === 0) return entries;
  const minAdd = Math.min(...active.map((e) => e.add));
  return entries.map((e) => ({ ...e, crowned: !e.out && e.add === minAdd }));
}

function buildSeries(players, chronologicalHistory) {
  return players.map((pl) => {
    const points = [{ round: 0, score: 0 }];
    let lastScore = 0;
    let isOut = false;
    chronologicalHistory.forEach((round, idx) => {
      if (isOut) return;
      const entry = round.entries.find((e) => e.name === pl.name);
      if (!entry) { points.push({ round: idx + 1, score: lastScore }); return; }
      if (entry.out) { points.push({ round: idx + 1, score: entry.rawTotal }); isOut = true; return; }
      lastScore = entry.after;
      points.push({ round: idx + 1, score: lastScore });
    });
    return { name: pl.name, points, out: pl.out };
  });
}

function ScoreChart({ series, maxRound }) {
  const width = 600, height = 240;
  const margin = { top: 16, right: 16, bottom: 28, left: 32 };
  const innerW = width - margin.left - margin.right;
  const innerH = height - margin.top - margin.bottom;
  const x = d3.scaleLinear().domain([0, Math.max(maxRound, 1)]).range([0, innerW]);
  const y = d3.scaleLinear().domain([0, 100]).range([innerH, 0]);
  const lineGen = d3.line().x((d) => x(d.round)).y((d) => y(d.score)).curve(d3.curveMonotoneX);
  const xTicks = x.ticks(Math.min(maxRound, 10));
  const yTicks = [0, 25, 50, 75, 100];

  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
      <g transform={`translate(${margin.left},${margin.top})`}>
        {[50, 100].map((t) => (
          <line key={t} x1={0} x2={innerW} y1={y(t)} y2={y(t)} stroke="#f59e0b" strokeDasharray="4 4" strokeOpacity={0.4} />
        ))}
        {yTicks.map((t) => (
          <g key={t} transform={`translate(0,${y(t)})`}>
            <line x2={innerW} stroke="#334155" strokeOpacity={0.4} />
            <text x={-8} dy="0.32em" textAnchor="end" fontSize="10" fill="#94a3b8">{t}</text>
          </g>
        ))}
        {xTicks.map((t) => (
          <text key={t} x={x(t)} y={innerH + 18} textAnchor="middle" fontSize="10" fill="#94a3b8">{t}</text>
        ))}
        {series.map((s, i) => (
          <g key={s.name}>
            <path d={lineGen(s.points)} fill="none" stroke={playerColor(i)} strokeWidth={2.5} opacity={s.out ? 0.4 : 1} />
            {s.points.map((p, j) => (
              <circle key={j} cx={x(p.round)} cy={y(p.score)} r={3} fill={playerColor(i)} opacity={s.out ? 0.4 : 1} />
            ))}
          </g>
        ))}
      </g>
    </svg>
  );
}

/* Spiller hele historikken på nytt fra rundenes råpoeng — gjør redigering trygt */
function replay(roster, rounds) {
  const state = {}; // id -> { score, out }
  roster.forEach((pl) => { state[pl.id] = { score: 0, out: false }; });
  const chronological = rounds.map((round) => {
    const entries = [];
    roster.forEach((pl) => {
      const st = state[pl.id];
      if (st.out) return;
      const add = round.adds[pl.id] ?? 0;
      const rawTotal = st.score + add;
      const result = applyJanivRule(rawTotal);
      entries.push({
        name: pl.name, add, before: st.score, rawTotal,
        after: result.score, triggered: result.score !== rawTotal && !result.out, out: result.out,
      });
      st.score = result.score; st.out = result.out;
    });
    return { id: round.id, entries };
  });
  return { chronological, state };
}

function JanivApp() {
  const [roster, setRoster] = useState([]);       // [{id, name}]
  const [rounds, setRounds] = useState([]);       // [{id, adds: {playerId: tall}}] i spilt rekkefølge
  const [newName, setNewName] = useState("");
  const [roundInputs, setRoundInputs] = useState({});
  const [showTable, setShowTable] = useState(false);
  const [editIdx, setEditIdx] = useState(null);   // index i rounds som redigeres
  const [editVals, setEditVals] = useState({});

  const { chronological, state } = useMemo(() => replay(roster, rounds), [roster, rounds]);
  const players = useMemo(() => roster.map((pl) => ({ ...pl, ...state[pl.id] })), [roster, state]);
  const history = useMemo(() => [...chronological].reverse(), [chronological]);
  const series = useMemo(() => buildSeries(players, chronological), [players, chronological]);

  const addPlayer = () => {
    const name = newName.trim();
    if (!name) return;
    setRoster((p) => [...p, { id: Date.now(), name }]);
    setNewName("");
  };

  const removePlayer = (id) => {
    setRoster((p) => p.filter((pl) => pl.id !== id));
    setRoundInputs((r) => { const copy = { ...r }; delete copy[id]; return copy; });
  };

  const setRoundInput = (id, val) => setRoundInputs((r) => ({ ...r, [id]: val }));

  const playRound = () => {
    const adds = {};
    roster.forEach((pl) => {
      if (state[pl.id]?.out) return;
      const raw = roundInputs[pl.id];
      adds[pl.id] = raw === undefined || raw === "" ? 0 : parseInt(raw, 10) || 0;
    });
    setRounds((r) => [...r, { id: Date.now(), adds }]);
    setRoundInputs({});
  };

  const undoLast = () => setRounds((r) => r.slice(0, -1));

  const startEdit = (histIdx) => { // histIdx er i nyeste-først-listen
    const roundIdx = rounds.length - 1 - histIdx;
    const vals = {};
    roster.forEach((pl) => { vals[pl.id] = String(rounds[roundIdx].adds[pl.id] ?? ""); });
    setEditVals(vals);
    setEditIdx(roundIdx);
  };
  const saveEdit = () => {
    setRounds((r) => r.map((round, i) => {
      if (i !== editIdx) return round;
      const adds = {};
      roster.forEach((pl) => {
        const raw = editVals[pl.id];
        if (raw === undefined || raw === "") return;
        adds[pl.id] = parseInt(raw, 10) || 0;
      });
      return { ...round, adds };
    }));
    setEditIdx(null);
  };

  const resetAll = () => { setRounds([]); setRoundInputs({}); setEditIdx(null); };

  const colorFor = (score) => {
    if (score >= 80) return "from-rose-500 to-red-600";
    if (score >= 50) return "from-amber-400 to-orange-500";
    if (score >= 20) return "from-yellow-300 to-amber-400";
    return "from-emerald-400 to-teal-500";
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white p-4 sm:p-8">
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-8">
          <h1 className="text-4xl font-black tracking-tight bg-gradient-to-r from-emerald-400 via-teal-300 to-cyan-400 bg-clip-text text-transparent">
            Janiv
          </h1>
          <p className="text-slate-400 mt-1 text-sm">50 → ned til 0 &nbsp;•&nbsp; 100 → ned til 50</p>
        </div>

        <div className="flex gap-2 mb-6">
          <input
            value={newName}
            onChange={(e) => setNewName(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addPlayer()}
            placeholder="Navn på spiller..."
            className="flex-1 bg-slate-800/70 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-500"
          />
          <button onClick={addPlayer} className="bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all rounded-xl px-4 flex items-center justify-center">
            <Plus size={22} />
          </button>
        </div>

        {players.length === 0 && (
          <div className="text-center text-slate-500 py-10 border border-dashed border-slate-700 rounded-2xl mb-6">
            <Users className="mx-auto mb-2 opacity-50" size={28} />
            Legg til spillere for å starte
          </div>
        )}

        <div className="space-y-3 mb-6">
          {players.map((pl) => (
            <div key={pl.id} className={`bg-slate-800/60 border rounded-2xl p-4 flex items-center gap-3 ${pl.out ? "border-rose-500/60 opacity-60" : "border-slate-700"}`}>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between mb-2">
                  <span className="font-semibold truncate">
                    {pl.name} {pl.out && <span className="text-rose-400 text-xs font-bold ml-1">UTE</span>}
                  </span>
                  <button onClick={() => removePlayer(pl.id)} className="text-slate-500 hover:text-rose-400 transition-colors">
                    <Trash2 size={16} />
                  </button>
                </div>
                <div className="w-full h-2.5 bg-slate-700/60 rounded-full overflow-hidden mb-1">
                  <div className={`h-full bg-gradient-to-r ${pl.out ? "from-rose-600 to-rose-800" : colorFor(pl.score)} transition-all duration-500`} style={{ width: `${Math.min(pl.score, 100)}%` }} />
                </div>
                {!pl.out && (
                  <span className="text-xs text-slate-500">
                    {distanceToThreshold(pl.score) === 0 ? "På terskelen!" : `${distanceToThreshold(pl.score)} unna ${nextThreshold(pl.score)}`}
                  </span>
                )}
              </div>
              <div className="text-2xl font-black w-12 text-center tabular-nums">{pl.score}</div>
              <input
                type="number"
                disabled={pl.out}
                value={roundInputs[pl.id] ?? ""}
                onChange={(e) => setRoundInput(pl.id, e.target.value)}
                placeholder="+0"
                className="w-16 bg-slate-900/70 border border-slate-700 rounded-lg px-2 py-2 text-center outline-none focus:border-emerald-400 disabled:opacity-40"
              />
            </div>
          ))}
        </div>

        {players.length > 0 && (
          <div className="flex gap-2 mb-8">
            <button onClick={playRound} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 hover:opacity-90 active:scale-95 transition-all rounded-xl py-3 font-bold">
              Spill runde
            </button>
            <button onClick={resetAll} className="bg-slate-700 hover:bg-slate-600 active:scale-95 transition-all rounded-xl px-4 flex items-center justify-center" title="Nullstill alt">
              <RotateCcw size={18} />
            </button>
          </div>
        )}

        {history.length > 0 && (
          <div className="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-4 mb-6">
            <h2 className="text-slate-400 text-sm font-semibold mb-3 uppercase tracking-wide flex items-center gap-1.5">
              <LineChartIcon size={14} /> Poengutvikling
            </h2>
            <ScoreChart series={series} maxRound={history.length} />
            <div className="flex flex-wrap gap-3 mt-2">
              {players.map((pl, i) => (
                <div key={pl.id} className="flex items-center gap-1.5 text-xs text-slate-400">
                  <span className="w-2.5 h-2.5 rounded-full" style={{ background: playerColor(i) }} />
                  {pl.name}
                </div>
              ))}
            </div>
          </div>
        )}

        {history.length > 0 && (
          <div className="mb-8">
            <div className="flex items-center justify-between mb-2">
              <h2 className="text-slate-400 text-sm font-semibold uppercase tracking-wide">Resultattabell</h2>
              <button onClick={() => setShowTable((s) => !s)} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-emerald-400 transition-colors">
                <Table2 size={14} /> {showTable ? "Skjul" : "Vis"}
              </button>
            </div>
            {showTable && (
              <div className="overflow-x-auto rounded-xl border border-slate-700/60">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-slate-800/70">
                      <th className="text-left px-3 py-2 text-slate-400 font-semibold sticky left-0 bg-slate-800/70">Spiller</th>
                      {chronological.map((_, idx) => (
                        <th key={idx} className="px-3 py-2 text-slate-400 font-semibold text-center whitespace-nowrap">Runde {idx + 1}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {series.map((s, i) => (
                      <tr key={s.name} className="border-t border-slate-700/40">
                        <td className="px-3 py-2 font-semibold sticky left-0 bg-slate-900/80 whitespace-nowrap" style={{ color: playerColor(i) }}>{s.name}</td>
                        {chronological.map((round, idx) => {
                          const entry = round.entries.find((e) => e.name === s.name);
                          return (
                            <td key={idx} className="px-3 py-2 text-center tabular-nums text-slate-300">
                              {entry ? (entry.out ? `${entry.rawTotal} 💀` : entry.after) : "—"}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {history.length > 0 && (
          <div>
            <div className="flex items-center justify-between mb-2">
              <h2 className="text-slate-400 text-sm font-semibold uppercase tracking-wide">Historikk</h2>
              <button onClick={undoLast} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-amber-400 transition-colors">
                <RotateCcw size={13} /> Gå tilbake (angre siste runde)
              </button>
            </div>
            <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
              {history.map((round, hIdx) => {
                const roundIdx = rounds.length - 1 - hIdx;
                const isEditing = editIdx === roundIdx;
                return (
                  <div key={round.id} className={`bg-slate-800/40 border rounded-xl p-3 text-sm ${isEditing ? "border-emerald-500/70" : "border-slate-700/60"}`}>
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-xs text-slate-500 font-semibold">Runde {roundIdx + 1}</span>
                      {!isEditing && (
                        <button onClick={() => startEdit(hIdx)} className="text-xs text-slate-500 hover:text-emerald-400 transition-colors">
                          ✏️ Rediger
                        </button>
                      )}
                    </div>
                    {isEditing ? (
                      <div className="space-y-2">
                        {roster.map((pl) => (
                          <div key={pl.id} className="flex items-center justify-between gap-2">
                            <span className="text-slate-300">{pl.name}</span>
                            <input
                              type="number"
                              value={editVals[pl.id] ?? ""}
                              onChange={(e) => setEditVals((v) => ({ ...v, [pl.id]: e.target.value }))}
                              className="w-20 bg-slate-900/70 border border-slate-700 rounded-lg px-2 py-1.5 text-center outline-none focus:border-emerald-400"
                            />
                          </div>
                        ))}
                        <div className="flex gap-2 pt-1">
                          <button onClick={saveEdit} className="flex-1 bg-emerald-500 hover:bg-emerald-400 rounded-lg py-1.5 text-sm font-bold text-slate-900">Lagre</button>
                          <button onClick={() => setEditIdx(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 rounded-lg py-1.5 text-sm">Avbryt</button>
                        </div>
                        <p className="text-xs text-slate-500">Poengene under regnes ut på nytt automatisk.</p>
                      </div>
                    ) : (
                      withCrowns(round.entries).map((e, i) => (
                        <div key={i} className="flex justify-between text-slate-300">
                          <span className="flex items-center gap-1">
                            {e.crowned && <Crown size={13} className="text-amber-400 shrink-0" />}
                            {e.name} {e.add !== 0 && <span className="text-slate-500">+{e.add}</span>}
                          </span>
                          <span>
                            {e.before} →{" "}
                            {e.out ? (
                              <span className="text-rose-400 font-semibold">{e.rawTotal} (UTE)</span>
                            ) : e.triggered ? (
                              <span className="text-amber-400 font-semibold">{e.rawTotal} ⤵ {e.after}</span>
                            ) : (
                              <span className="font-semibold">{e.after}</span>
                            )}
                          </span>
                        </div>
                      ))
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JanivApp />);
</script>
</body>
</html>
